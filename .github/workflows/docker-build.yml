name: Docker Build Validation

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-build:
    name: Validate Compose and build application images
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      POSTGRES_DB: resume_tailor_ci
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_password
      POSTGRES_PORT: "5433"
      REDIS_PORT: "6379"
      BACKEND_PORT: "8080"
      FRONTEND_PORT: "5173"
      VITE_API_BASE_URL: http://localhost:8080
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: ""
      OPENAI_MODEL_NAME: ci-no-external-calls
      JWT_SECRET: ci-only-jwt-secret-that-is-long-enough-for-hs256-tests
      JWT_EXPIRATION_MS: "3600000"
      AI_QUOTA_DAILY_LIMIT: "5"
      AI_RATE_LIMIT_RESUME_GENERATE_PER_MINUTE: "3"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha,scope=docker-backend
          cache-to: type=gha,mode=max,scope=docker-backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=docker-frontend
          cache-to: type=gha,mode=max,scope=docker-frontend
