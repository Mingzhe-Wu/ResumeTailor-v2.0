<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeTailor Job Importer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>ResumeTailor Job Importer</h1>
        <p>Import the visible job posting page into your local ResumeTailor app.</p>
      </header>

      <section class="panel-section form-section" aria-label="Backend settings">
        <h2>Connection</h2>
        <label for="backendBaseUrl">Backend Base URL</label>
        <input
          id="backendBaseUrl"
          type="url"
          value="http://localhost:8080"
          placeholder="http://localhost:8080"
        />
      </section>

      <section class="panel-section form-section" aria-label="Extension authentication">
        <div class="section-title-row">
          <h2>Extension Login</h2>
          <span id="loginStatusBadge" class="login-status-badge">Not logged in</span>
        </div>
        <label for="loginEmail">Email</label>
        <input
          id="loginEmail"
          type="email"
          autocomplete="username"
          placeholder="you@example.com"
        />

        <label for="loginPassword">Password</label>
        <input
          id="loginPassword"
          type="password"
          autocomplete="current-password"
          placeholder="ResumeTailor password"
        />

        <button id="loginButton" class="secondary-button" type="button">
          Login to ResumeTailor
        </button>

        <label for="jwtTokenDisplay">Extension Token</label>
        <div
          id="jwtTokenDisplay"
          class="token-display"
          aria-live="polite"
        >
          No token loaded
        </div>
        <button id="logoutButton" class="secondary-button subtle-button" type="button">
          Clear Extension Token
        </button>
      </section>

      <section class="panel-section import-section" aria-label="Job import action">
        <h2>Import</h2>
        <button id="importButton" class="primary-button" type="button">
          Import Current Job
        </button>
        <button id="copyJdButton" class="secondary-button" type="button">
          Copy JD to Clipboard
        </button>
        <label for="defaultJobStatus">Default Job Status</label>
        <select id="defaultJobStatus">
          <option value="1">Saved</option>
          <option value="2">Applied</option>
          <option value="3">Interview</option>
          <option value="4">Offer</option>
          <option value="5">Rejected</option>
        </select>
      </section>

      <p id="statusMessage" class="status-message" role="status"></p>

      <section class="panel-section preview-card" aria-label="Extraction preview">
        <h2>Preview</h2>
        <dl>
          <div>
            <dt>Title</dt>
            <dd id="previewTitle">Not imported yet</dd>
          </div>
          <div>
            <dt>URL</dt>
            <dd id="previewUrl">Not imported yet</dd>
          </div>
          <div>
            <dt>Text Length</dt>
            <dd id="previewLength">0 characters</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
