spring:
  application:
    name: resume_tailor

  datasource:
    url: jdbc:postgresql://localhost:5433/resume_tailor
    username: user
    password: password

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true

ai:
  pricing:
    input-per-million: 5.00
    output-per-million: 30.00
